name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or frustration
      placeholder: "I wish I could filter leads by country..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution
    validations:
      required: false
  - type: dropdown
    id: area
    attributes:
      label: Which part of Prospector?
      options:
        - Dashboard UI
        - Scraping engine
        - Data export
        - New data source
        - Other
    validations:
      required: false
